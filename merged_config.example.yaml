# AutoCTP 本地配置模板 — 复制为 merged_config.yaml 后按环境修改
# 设计目标：7×24 无人值守（fail-fast 启动自检 + 持久启动确认，改 CSV/ledger 后 invalidate 重确认）
# CTP 账号、飞书 webhook 等从 autotrade 的 auto_config.yaml 加载（勿提交实盘配置）
# 路径优先用环境变量 AUTOTRADE_ROOT / AUTOSTRAGGLE_ROOT；留空则使用 ctp_bootstrap 内置默认
merged:
  autotrade_root: ""
  autostraggle_root: ""

dual_strategy:
  strategy_order: [spread, strangle]
  spread_order_ref_max: 499999
  strangle_trade_journal: data/strangle_trade_journal.jsonl
  fill_ledger_csv: data/fill_ledger.csv
  fill_ledger_journal: data/fill_ledger_journal.jsonl
  unified_fill_feishu: true
  fill_feishu_enabled: true
  exclude_spread_from_strangle_reconcile: true
  exclude_strangle_from_spread_positions: true
  exclude_strangle_from_spread_reconcile: true
  use_spread_leg_claims: true
  spread_execution_from_ledger: true
  spread_close_from_ledger: true
  pause_spread_open_on_reconcile_mismatch: true
  # true：价差段 OrderRef 成交仅当合约属于 spread tradeinfo 才写入 CSV
  spread_fill_require_tradeinfo_match: true
  # 价差段成交但合约仅宽跨认领、价差认领为 0 时不写入 spread CSV（防 OrderRef 串段）
  spread_fill_skip_strangle_owned_instruments: true
  # true：启动 derive 时跳过 spread tradeinfo 外合约（防 CTP−宽跨 污染 CSV）
  spread_derive_require_tradeinfo_match: true
  # true：启动回放成交后自动移除 tradeinfo 外 / CTP 无仓的孤儿认领
  spread_purge_invalid_claims_on_startup: true
  auto_sync_spread_positions_csv: true
  spread_positions_csv: data/spread_positions.csv
  spread_trade_journal: data/spread_trade_journal.jsonl
  spread_reconcile_fallback_heuristic: false
  tradeinfo_path: tradeinfo
  spread_sheet: spread
  strangle_sheet: strangle
  spread_csv: tradeinfo/spread.csv
  strangle_csv: tradeinfo/strangle.csv
  require_startup_ack: true
  # 7×24：人工冷启动仍弹确认；进程内异常重启可凭 ack 文件跳过；
  # 改 CSV/ledger 后运行 scripts/invalidate_startup_ack.py 重确认
  startup_ack_each_run: false
  startup_ack_interactive: true
  # true=弹窗三选一（确认 / 价差=CTP−宽跨并确认 / 取消）；无显示器服务器设 false，终端输入 derive
  startup_ack_use_gui: true
  startup_ack_prefer_gui: true
  startup_ack_force_terminal: false
  startup_ack_persist: true
  # false=确认文件跨日有效；改持仓 CSV 后请运行 scripts/invalidate_startup_ack.py 再冷启动
  startup_ack_require_today: false
  startup_ack_file: data/position_startup_ack.txt
  startup_ack_track_ledger_files: true
  # 人工步骤 2 确认外部仓后写入；无人值守重启时校验 JSON 与 live CTP 分解一致
  external_positions_ack_file: data/external_positions_ack.json
  external_ack_persist: true
  # true=外部仓 JSON 仅当日有效（与 startup_ack_require_today 独立）
  external_ack_require_today: false
  # 无人值守恢复 JSON 时与 CTP 分解不一致则拒绝启动
  external_ack_strict_on_restore: true
  allow_start_on_reconcile_mismatch: false
  reconcile_interval_sec: 60
  # derive 后给主循环对账一段豁免窗口，避免 OnRtnTrade 异步落账期间被
  # 立刻判 halt（差异仅记录，不强制 close-only）。0 表示禁用豁免。
  reconcile_grace_after_derive_sec: 30
  # 对账 transient 失败（持仓查询失败等）连续 N 次后强制 halt；单次仍沿用上一轮
  reconcile_transient_halt_after: 1
  journal_daily_shards: true
  journal_retain_days: 14

# 心跳告警 / 死链检测（OnHeartBeatWarning 早于 OnFrontDisconnected 触发）
# 单位: 秒。dead_threshold 超过即主动重连；log_cooldown / dead_cooldown 防刷
# ctp_heartbeat_log_cooldown_sec: 60
# ctp_heartbeat_dead_threshold_sec: 90
# ctp_heartbeat_dead_cooldown_sec: 120

# 健康检查发现的"僵尸订单"重复撤单冷却（同一 order_ref 内不再触发）
# zombie_cancel_cooldown_sec: 300

# 隔离期安全降级（默认关闭）：
# - false：保持当前语义，隔离期全停（含平仓）
# - true：仅当 TD/MD 均登录 + 码表就绪 + 本地无 pending_orders 时，允许 close-only 扫描
#         （仅平仓与 close-only 再平衡，禁止开仓）
reconnect_quarantine:
  close_only_enabled: false

# 发单白名单拦截飞书冷却（同 conn + 拦截原因键，默认 300s；0=不冷却）
# whitelist_feishu_cooldown_sec: 300

# 价差日开仓笔数粗节流（非核心风控，可放大如 200～500）
# daily_trade_limit: 200  # 继承 autotrade auto_config.yaml，此处可覆盖

# 动态开仓 clip：单次 combo 组数（市值 + L1 参与率，不写进 tradeinfo）
open_clip:
  enabled: true
  target_yuan: 20000
  max_groups: 8
  participation_base: 0.30
  floor_to_one_after_precheck: true

log_level: INFO
# 日志降噪（只收敛输出，不改 VIX 算法/缓存，不改 autotrade）：
# - throttle_substrings：命中的 INFO/WARNING 在窗口内"同一条完整文本"只输出一次
#   （压制 autotrade VIX 在宽跨路径同品种一轮重复打印十余次的噪音）。
# - downgrade：把非交易态撤单回报等"预期摩擦"从 ERROR 降级（默认→WARNING）。
# 安全：ERROR 及以上不会被节流；交易动作类日志（触发/开仓/平仓/账本选中）不在匹配范围。
# 临时排障想看全量重复日志：把 enabled 置 false。
log_noise:
  enabled: true
  throttle_window_sec: 60
  throttle_substrings:
    - 提升次近月为近月
    - 品种整体 VIX 无法计算
    - VIX无法计算
  downgrade:
    - substring: 当前状态禁止此项操作
      to_level: WARNING
loop_interval: 10
# 未在 merged_config.yaml 显式设置时默认 10 万元；设为 0 且未 block 则警告（无人值守默认 block）
global_margin_limit: 100000
margin_recheck_interval_sec: 300
# 启动保证金 over_limit/unknown 飞书告警冷却（秒）
# startup_margin_alert_cooldown_sec: 1800
main_loop_max_consecutive_errors: 10
# 运行时指标日志周期（秒）：输出 quarantine / halt 次数与累计时长
metrics_log_interval_sec: 300

# 无人值守 fail-fast：守卫/邻月/保证金未启用则拒绝启动（代码默认 true，此处显式写出便于核对）
fail_fast_on_guard_install: true
fail_fast_on_empty_target_months: true
block_start_without_margin_limit: true
# 三仓兼容锁（建议开启告警；重大发布可临时设 compat_lock_enforce=true）
compat_lock_path: docs/compat_lock.yaml
compat_lock_enforce: false
compat_lock_warn_dirty: true

# 残余风险飞书告警（不改变 halt/交易语义，仅通知）
risk_alert_cooldown_sec: 1800
feishu_pause_exposure_alert: true
margin_unknown_alert_after: 3
quarantine_alert_after_sec: 600
reconcile_halt_open_unmatched_alert: true
# 进程级异常重启上限（与 main_loop_max_consecutive_errors 互补：后者管单轮内连续异常）
#   0 — 7×24 默认：进程内异常后指数退避重启，不退出（适合无人值守）
#   3~10 — 连续失败达上限后 sys.exit(3) 并飞书，避免无限重启掩盖配置/对账根因
# 实盘若需「故障停机等人介入」，建议 5 左右；纯无人值守保持 0
max_restart_attempts: 0
# 单次重启等待上限（秒）；与 restart_delay 指数退避配合
max_restart_delay: 600

strangle:  # 以下数值为模板示例，实盘请按资金与风控自行设定
  daily_buy_limit_yuan: 300000
  ledger_path: data/ledger_strangle.json
  order_ref_min: 500000
  auto_sync_positions_csv: true
  phase2_timeout: 15  # 便宜腿单笔等待（秒）；勿与价差 B_timeout 混用顶层 B_timeout
