repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
  - repo: local
    hooks:
      - id: check-sensitive-files
        name: block tracked runtime data
        entry: python scripts/check_sensitive_files.py
        language: system
        pass_filenames: false
