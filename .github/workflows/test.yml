name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install -r requirements-dev.txt
      - name: Ruff
        run: ruff check .
      - name: Block tracked runtime data
        run: python scripts/check_sensitive_files.py

  pytest-unit:
    runs-on: ubuntu-latest
    env:
      AUTOCTP_ALLOW_MISSING_DEPS: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install -r requirements-dev.txt
      - name: Run unit tests (no autotrade required)
        run: python scripts/run_unit_tests.py --cov=. --cov-report=term-missing --tb=long

  pytest-unit-windows:
    runs-on: windows-latest
    env:
      AUTOCTP_ALLOW_MISSING_DEPS: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install -r requirements-dev.txt
      - name: Run unit tests on Windows
        run: python scripts/run_unit_tests.py

  pytest-full:
    # 只要 lint 通过就跑（不等待 pytest-unit），避免 unit 红时整 job 被 GitHub 跳过。
    runs-on: ubuntu-latest
    needs: [lint]
    if: ${{ !cancelled() && needs.lint.result == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: autoctp

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check if dependency repos are configured
        id: check_deps
        env:
          AUTOTRADE_REPO_URL: ${{ secrets.AUTOTRADE_REPO_URL }}
          AUTOSTRAGGLE_REPO_URL: ${{ secrets.AUTOSTRAGGLE_REPO_URL }}
        run: |
          if [ -z "$AUTOTRADE_REPO_URL" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "autostraggle_configured=false" >> "$GITHUB_OUTPUT"
            echo "Skipping full suite: secret AUTOTRADE_REPO_URL not set"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
            if [ -n "$AUTOSTRAGGLE_REPO_URL" ]; then
              echo "autostraggle_configured=true" >> "$GITHUB_OUTPUT"
            else
              echo "autostraggle_configured=false" >> "$GITHUB_OUTPUT"
              echo "::notice::AUTOSTRAGGLE_REPO_URL 未配置，pytest-full 仅 clone autotrade 并跳过 autostraggle 用例"
            fi
          fi

      - name: Clone autotrade
        if: steps.check_deps.outputs.configured == 'true'
        env:
          AUTOTRADE_REPO_URL: ${{ secrets.AUTOTRADE_REPO_URL }}
          DEPENDENCY_REPO_PAT: ${{ secrets.DEPENDENCY_REPO_PAT }}
        run: |
          set -euo pipefail
          auth_clone_url() {
            local url="$1"
            if [[ "$url" == *'@'* ]]; then
              printf '%s' "$url"
              return
            fi
            if [[ "$url" =~ ^https://github.com/ ]] && [ -n "${DEPENDENCY_REPO_PAT:-}" ]; then
              printf 'https://x-access-token:%s@%s' "$DEPENDENCY_REPO_PAT" "${url#https://}"
              return
            fi
            printf '%s' "$url"
          }
          auth="$(auth_clone_url "$AUTOTRADE_REPO_URL")"
          if [[ "$auth" == "$AUTOTRADE_REPO_URL" ]] && [[ "$AUTOTRADE_REPO_URL" =~ ^https://github.com/ ]] && [[ "$AUTOTRADE_REPO_URL" != *'@'* ]]; then
            echo "::error::无法 clone autotrade：请添加 secret DEPENDENCY_REPO_PAT（PAT，需 repo 读权限），或在 AUTOTRADE_REPO_URL 中嵌入 token"
            exit 1
          fi
          git clone --depth 1 "$auth" autotrade

      - name: Clone autostraggle
        if: steps.check_deps.outputs.autostraggle_configured == 'true'
        env:
          AUTOSTRAGGLE_REPO_URL: ${{ secrets.AUTOSTRAGGLE_REPO_URL }}
          DEPENDENCY_REPO_PAT: ${{ secrets.DEPENDENCY_REPO_PAT }}
        run: |
          set -euo pipefail
          auth_clone_url() {
            local url="$1"
            if [[ "$url" == *'@'* ]]; then
              printf '%s' "$url"
              return
            fi
            if [[ "$url" =~ ^https://github.com/ ]] && [ -n "${DEPENDENCY_REPO_PAT:-}" ]; then
              printf 'https://x-access-token:%s@%s' "$DEPENDENCY_REPO_PAT" "${url#https://}"
              return
            fi
            printf '%s' "$url"
          }
          auth="$(auth_clone_url "$AUTOSTRAGGLE_REPO_URL")"
          if [[ "$auth" == "$AUTOSTRAGGLE_REPO_URL" ]] && [[ "$AUTOSTRAGGLE_REPO_URL" =~ ^https://github.com/ ]] && [[ "$AUTOSTRAGGLE_REPO_URL" != *'@'* ]]; then
            echo "::error::无法 clone autostraggle：请添加 secret DEPENDENCY_REPO_PAT，或在 AUTOSTRAGGLE_REPO_URL 中嵌入 token"
            exit 1
          fi
          git clone --depth 1 "$auth" autostraggle

      - name: Install dependencies
        if: steps.check_deps.outputs.configured == 'true'
        working-directory: autoctp
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install -r requirements-dev.txt

      - name: Run full suite
        if: steps.check_deps.outputs.configured == 'true' && steps.check_deps.outputs.autostraggle_configured == 'true'
        working-directory: autoctp
        env:
          AUTOTRADE_ROOT: ${{ github.workspace }}/autotrade
          AUTOSTRAGGLE_ROOT: ${{ github.workspace }}/autostraggle
          AUTOCTP_STUB_OPENCTP: '1'
        run: pytest tests/ -q --tb=long --strict-markers

      - name: Run autotrade-only integration suite
        if: steps.check_deps.outputs.configured == 'true' && steps.check_deps.outputs.autostraggle_configured != 'true'
        working-directory: autoctp
        env:
          AUTOTRADE_ROOT: ${{ github.workspace }}/autotrade
          AUTOCTP_ALLOW_MISSING_DEPS: '1'
          CI_AUTOTRADE_ONLY: '1'
          AUTOCTP_STUB_OPENCTP: '1'
        run: pytest tests/ -q --tb=long --strict-markers -m "integration and not autostraggle"

      - name: Full suite skipped hint
        if: steps.check_deps.outputs.configured != 'true'
        run: echo "::notice::pytest-full skipped — 至少配置 AUTOTRADE_REPO_URL（见 docs/CI.md）"
